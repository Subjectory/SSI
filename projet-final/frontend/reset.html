<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CorpHack Reset Password</title>
  <link rel="stylesheet" href="css/style.css" />
</head>
<body data-page="reset">
  <main class="landing-shell">
    <section class="landing-hero">
      <span class="eyebrow">Reset password</span>
      <h1>Reinitialisation du compte employee.</h1>
      <p class="muted">
        Utilise le token issu de la mailbox preview pour definir un nouveau mot de passe puis revenir au dashboard.
      </p>
    </section>

    <section class="landing-panel">
      <section class="card">
        <h2>Mettre a jour le mot de passe</h2>
        <div data-api-status class="status-box info">Verification de l'API...</div>
        <form id="resetForm" class="stack">
          <label for="resetToken">Token</label>
          <input id="resetToken" type="text" placeholder="uuid" required />

          <label for="resetPassword">Nouveau mot de passe</label>
          <input id="resetPassword" type="password" placeholder="NewPassword!2026" required />

          <button type="submit">Valider</button>
        </form>
        <div id="resetStatus" class="status-box info"></div>
      </section>
    </section>
  </main>

  <script type="module" src="js/app.js"></script>
</body>
</html>
