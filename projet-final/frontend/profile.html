<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CorpHack Profil</title>
  <link rel="stylesheet" href="css/style.css" />
</head>
<body data-page="profile">
  <main class="page-shell">
    <header class="topbar">
      <div class="brand-block">
        <h1>Profils internes</h1>
        <p>Consultation des informations employee, manager ou admin.</p>
      </div>
      <div class="inline-row">
        <span id="navUser" class="pill">Session</span>
        <button onclick="logout()">Deconnexion</button>
      </div>
    </header>

    <nav class="nav">
      <a href="dashboard.html">Dashboard</a>
      <a href="profile.html">Profil</a>
      <a href="blog.html">Annonces</a>
      <a href="upload.html">Documents</a>
      <a href="trainings.html">Formations</a>
      <a href="admin.html">Admin</a>
    </nav>
    <div data-api-status class="status-box info">Verification de l'API...</div>

    <section class="single-column">
      <article class="card">
        <h2>Recherche de profil</h2>
        <form id="profileLookupForm" class="stack">
          <label for="profileId">ID du profil</label>
          <input id="profileId" type="number" min="1" />
          <button type="submit">Charger</button>
        </form>
        <div id="profileStatus" class="status-box info"></div>
      </article>

      <article class="card">
        <h2>Resultat</h2>
        <div id="profileResult"></div>
      </article>
    </section>
  </main>

  <script type="module" src="js/app.js"></script>
</body>
</html>
