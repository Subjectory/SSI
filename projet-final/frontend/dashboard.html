<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CorpHack Intranet - Dashboard</title>
  <link rel="stylesheet" href="css/style.css" />
</head>
<body onload="loadDashboard()">
  <header class="topbar">
    <div>
      <h1>CorpHack Dashboard</h1>
      <p class="subtitle">Vue d’ensemble du portail interne</p>
    </div>
    <button onclick="logout()">Déconnexion</button>
  </header>

  <nav class="nav">
    <a href="dashboard.html">Dashboard</a>
    <a href="profile.html">Profil</a>
    <a href="blog.html">Blog</a>
    <a href="upload.html">Upload</a>
    <a href="admin.html">Admin</a>
  </nav>

  <main class="grid">
    <section class="card">
      <h2>Utilisateur connecté</h2>
      <div id="dashboardUser"></div>
    </section>

    <section class="card">
      <h2>Vérification token</h2>
      <div id="tokenStatus"></div>
    </section>

    <section class="card">
      <h2>Accès rapide</h2>
      <ul>
        <li>Consulter le profil employé</li>
        <li>Lire le blog interne</li>
        <li>Déposer un document</li>
        <li>Tester l’accès admin</li>
      </ul>
    </section>
  </main>

  <script src="js/app.js"></script>
</body>
</html>
