<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CorpHack Dashboard</title>
  <link rel="stylesheet" href="css/style.css" />
</head>
<body data-page="dashboard">
  <main class="page-shell">
    <header class="topbar">
      <div class="brand-block">
        <h1>CorpHack Dashboard</h1>
        <p>Vue d'ensemble du portail interne et de vos preferences.</p>
      </div>
      <div class="inline-row">
        <span id="navUser" class="pill">Session</span>
        <button onclick="logout()">Deconnexion</button>
      </div>
    </header>

    <nav class="nav">
      <a href="dashboard.html">Dashboard</a>
      <a href="profile.html">Profil</a>
      <a href="blog.html">Annonces</a>
      <a href="upload.html">Documents</a>
      <a href="trainings.html">Formations</a>
      <a href="admin.html">Admin</a>
    </nav>
    <div data-api-status class="status-box info">Verification de l'API...</div>

    <section class="layout-grid">
      <article class="card">
        <h2>Compte connecte</h2>
        <div id="dashboardUser"></div>
      </article>

      <article class="card">
        <h2>Preferences JSON</h2>
        <form id="preferencesForm" class="stack">
          <textarea id="preferencesJson"></textarea>
          <button type="submit">Mettre a jour</button>
        </form>
        <div id="preferencesStatus" class="status-box info"></div>
      </article>
    </section>

    <section class="single-column">
      <article class="card">
        <h2>Preview preferences</h2>
        <div id="preferencesPreview"></div>
      </article>
    </section>
  </main>

  <script type="module" src="js/app.js"></script>
</body>
</html>
