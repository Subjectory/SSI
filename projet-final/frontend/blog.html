<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CorpHack Intranet - Blog</title>
  <link rel="stylesheet" href="css/style.css" />
</head>
<body onload="loadBlogPage()">
  <header class="topbar">
    <div>
      <h1>Blog interne</h1>
      <p class="subtitle">Actualités et commentaires employés</p>
    </div>
    <button onclick="logout()">Déconnexion</button>
  </header>

  <nav class="nav">
    <a href="dashboard.html">Dashboard</a>
    <a href="profile.html">Profil</a>
    <a href="blog.html">Blog</a>
    <a href="upload.html">Upload</a>
    <a href="admin.html">Admin</a>
  </nav>

  <main class="single-column">
    <section class="card">
      <h2>Articles</h2>
      <div id="blog"></div>
      <div id="blogError" class="error-box"></div>
    </section>

    <section class="card">
      <h2>Ajouter un commentaire</h2>
      <label for="postId">ID du post</label>
      <input id="postId" type="number" value="1" min="1" />

      <label for="comment">Commentaire</label>
      <input id="comment" type="text" placeholder="Votre commentaire" />

      <button onclick="sendComment()">Publier</button>
      <div id="commentStatus"></div>
    </section>
  </main>

  <script src="js/app.js"></script>
</body>
</html>
