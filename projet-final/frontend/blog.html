<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CorpHack Annonces</title>
  <link rel="stylesheet" href="css/style.css" />
</head>
<body data-page="blog">
  <main class="page-shell">
    <header class="topbar">
      <div class="brand-block">
        <h1>Annonces internes</h1>
        <p>Flux de communication, commentaires riches et notes RH / SecOps.</p>
      </div>
      <div class="inline-row">
        <span id="navUser" class="pill">Session</span>
        <button onclick="logout()">Deconnexion</button>
      </div>
    </header>

    <nav class="nav">
      <a href="dashboard.html">Dashboard</a>
      <a href="profile.html">Profil</a>
      <a href="blog.html">Annonces</a>
      <a href="upload.html">Documents</a>
      <a href="trainings.html">Formations</a>
      <a href="admin.html">Admin</a>
    </nav>
    <div data-api-status class="status-box info">Verification de l'API...</div>

    <section class="single-column">
      <article class="card">
        <h2>Fil des annonces</h2>
        <div id="blogResult"></div>
      </article>

      <article class="card">
        <h2>Nouveau commentaire</h2>
        <form id="commentForm" class="stack">
          <label for="postId">ID du post</label>
          <input id="postId" type="number" value="1" min="1" />

          <label for="commentBody">Commentaire HTML riche</label>
          <textarea id="commentBody" placeholder="<p>Merci pour la note.</p>"></textarea>

          <button type="submit">Publier</button>
        </form>
        <div id="commentStatus" class="status-box info"></div>
      </article>
    </section>
  </main>

  <script type="module" src="js/app.js"></script>
</body>
</html>
