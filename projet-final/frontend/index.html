<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CorpHack Intranet - Login</title>
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>
  <main class="auth-page">
    <section class="auth-card">
      <h1>CorpHack Intranet</h1>
      <p class="subtitle">Portail employé interne</p>

      <form id="loginForm" class="stack">
        <label for="username">Nom d’utilisateur</label>
        <input id="username" type="text" placeholder="alice" required />

        <label for="password">Mot de passe</label>
        <input id="password" type="password" placeholder="********" required />

        <button type="submit">Se connecter</button>
      </form>

      <div id="error" class="error-box"></div>

      <div class="demo-box">
        <p><strong>Comptes de démo</strong></p>
        <p>Employé : <code>alice</code> / <code>Password123!</code></p>
        <p>Admin : <code>admin</code> / <code>Admin123!</code></p>
      </div>
    </section>
  </main>

  <script src="js/app.js"></script>
</body>
</html>
