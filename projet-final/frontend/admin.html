<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CorpHack Admin</title>
  <link rel="stylesheet" href="css/style.css" />
</head>
<body data-page="admin">
  <main class="page-shell">
    <header class="topbar">
      <div class="brand-block">
        <h1>Administration</h1>
        <p>Supervision intranet et diagnostics shell internes.</p>
      </div>
      <div class="inline-row">
        <span id="navUser" class="pill">Session</span>
        <button onclick="logout()">Deconnexion</button>
      </div>
    </header>

    <nav class="nav">
      <a href="dashboard.html">Dashboard</a>
      <a href="profile.html">Profil</a>
      <a href="blog.html">Annonces</a>
      <a href="upload.html">Documents</a>
      <a href="trainings.html">Formations</a>
      <a href="admin.html">Admin</a>
    </nav>
    <div data-api-status class="status-box info">Verification de l'API...</div>

    <section class="split-columns">
      <article class="card">
        <h2>Etat admin</h2>
        <div id="adminResult"></div>
      </article>

      <article class="card">
        <h2>Diagnostics ping</h2>
        <form id="diagnosticsForm" class="stack">
          <label for="diagnosticTarget">Target</label>
          <input id="diagnosticTarget" type="text" value="127.0.0.1" />
          <button type="submit">Executer</button>
        </form>
        <div id="adminStatus" class="status-box info"></div>
      </article>
    </section>

    <section class="single-column">
      <article class="card">
        <h2>Resultat diagnostics</h2>
        <div id="diagnosticsResult"></div>
      </article>
    </section>
  </main>

  <script type="module" src="js/app.js"></script>
</body>
</html>
