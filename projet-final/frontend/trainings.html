<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CorpHack Formations</title>
  <link rel="stylesheet" href="css/style.css" />
</head>
<body data-page="trainings">
  <main class="page-shell">
    <header class="topbar">
      <div class="brand-block">
        <h1>Formations & certifications</h1>
        <p>Catalogue interne, demandes d'acces, ressources et moteur de preview certificat.</p>
      </div>
      <div class="inline-row">
        <span id="navUser" class="pill">Session</span>
        <button onclick="logout()">Deconnexion</button>
      </div>
    </header>

    <nav class="nav">
      <a href="dashboard.html">Dashboard</a>
      <a href="profile.html">Profil</a>
      <a href="blog.html">Annonces</a>
      <a href="upload.html">Documents</a>
      <a href="trainings.html">Formations</a>
      <a href="admin.html">Admin</a>
    </nav>
    <div data-api-status class="status-box info">Verification de l'API...</div>

    <section class="split-columns">
      <article class="card">
        <h2>Catalogue</h2>
        <div id="trainingsList"></div>
      </article>

      <article class="card">
        <h2>Operations formations</h2>
        <form id="requestLookupForm" class="stack">
          <label for="requestId">Consulter une demande par ID</label>
          <input id="requestId" type="number" min="1" />
          <button type="submit" class="secondary-button">Voir la demande</button>
        </form>

        <form id="confirmForm" class="stack">
          <label for="confirmTrainingId">Confirmer une formation</label>
          <input id="confirmTrainingId" type="number" value="2" min="1" />
          <label for="reviewCode">Review code</label>
          <input id="reviewCode" type="text" placeholder="WARROOM-APR-2026" />
          <button type="submit">Confirmer</button>
        </form>
        <div id="trainingStatus" class="status-box info"></div>
        <div id="trainingActionsResult"></div>
      </article>
    </section>

    <section class="split-columns">
      <article class="card">
        <h2>Preview certificat</h2>
        <form id="certificateForm" class="stack">
          <label for="certificateTrainingId">Training ID</label>
          <input id="certificateTrainingId" type="number" value="2" min="1" />

          <label for="attendeeName">Nom du participant</label>
          <input id="attendeeName" type="text" placeholder="Alice Martin" />

          <label for="badgeUrl">Badge URL</label>
          <input id="badgeUrl" type="text" placeholder="http://127.0.0.1:3000/internal/certificates/signing-material" />

          <label for="customHtml">HTML additionnel</label>
          <textarea id="customHtml" placeholder="<p>Session validee.</p>"></textarea>

          <button type="submit">Generer la preview</button>
        </form>
        <div id="certificateStatus" class="status-box info"></div>
      </article>

      <article class="card">
        <h2>Resultats</h2>
        <div id="certificateResult"></div>
        <div id="trainingResourceResult"></div>
      </article>
    </section>
  </main>

  <script type="module" src="js/app.js"></script>
</body>
</html>
